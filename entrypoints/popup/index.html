<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>ArcPWA</title>
  <style>
    * { box-sizing: border-box; }
    body {
      width: 320px;
      font-family: system-ui, sans-serif;
      padding: 1rem;
      color: #1e293b;
      font-size: 0.875rem;
    }
    h1 {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    .section { margin-bottom: 1rem; }
    label {
      display: block;
      font-size: 0.75rem;
      color: #64748b;
      margin-bottom: 0.3rem;
      font-weight: 500;
    }
    .row { display: flex; gap: 0.375rem; }
    input[type="text"] {
      flex: 1;
      padding: 0.375rem 0.5rem;
      border: 1px solid #cbd5e1;
      border-radius: 4px;
      font-size: 0.8125rem;
      outline: none;
    }
    input[type="text"]:focus { border-color: #2563eb; }
    button {
      padding: 0.375rem 0.75rem;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.8125rem;
      white-space: nowrap;
    }
    button:hover { background: #1d4ed8; }
    button:disabled { background: #94a3b8; cursor: default; }
    .drop-zone {
      border: 2px dashed #cbd5e1;
      border-radius: 6px;
      padding: 1.25rem 1rem;
      text-align: center;
      color: #64748b;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
      user-select: none;
    }
    .drop-zone:hover,
    .drop-zone.drag-over { border-color: #2563eb; color: #2563eb; }
    .drop-zone small { display: block; margin-top: 0.25rem; font-size: 0.7rem; color: #94a3b8; }
    #status {
      font-size: 0.75rem;
      color: #64748b;
      min-height: 1rem;
      margin-top: 0.25rem;
    }
    #status.error { color: #dc2626; }
  </style>
</head>
<body>
  <h1>ArcPWA Viewer</h1>

  <div class="section">
    <label>Open from URL</label>
    <div class="row">
      <input type="text" id="url-input" placeholder="https://example.com/app.pwa.zip" />
      <button id="open-url-btn">Open</button>
    </div>
  </div>

  <div class="section">
    <label>Open local file</label>
    <div class="drop-zone" id="drop-zone">
      Drop .pwa.zip here or click to browse
      <small>Max ~10 MB</small>
      <input type="file" accept=".zip,.pwa.zip" style="display:none" id="file-input" />
    </div>
  </div>

  <div id="status"></div>

  <script type="module" src="./main.ts"></script>
</body>
</html>
