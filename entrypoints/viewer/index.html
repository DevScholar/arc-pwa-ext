<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ArcPWA Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #111; }
    #overlay {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      font-family: system-ui, sans-serif; font-size: 0.9rem;
      color: #ccc; gap: 0.5rem;
    }
    #overlay[hidden] { display: none; }
    #overlay.error { color: #f87171; white-space: pre-wrap; text-align: center; padding: 2rem; }
    .spinner {
      width: 28px; height: 28px;
      border: 3px solid #333; border-top-color: #888;
      border-radius: 50%; animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="overlay">
    <div class="spinner"></div>
    <span id="status-text">Loading…</span>
  </div>
  <script type="module" src="./main.ts"></script>
</body>
</html>
